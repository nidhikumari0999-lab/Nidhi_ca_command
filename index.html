<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nidhi CA Command Center v3</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Oxanium:wght@300;400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#07070f;--bg2:#0d0d1a;--bg3:#111120;--card:#0f0f1e;--card2:#131328;
  --border:#1a1a32;--border2:#232340;
  --gold:#f5c842;--gold2:#e8a020;
  --cyan:#00e5ff;--cyan2:#00b8d4;
  --green:#00e676;--green2:#00c853;
  --red:#ff4444;--red2:#cc0000;
  --purple:#b388ff;--orange:#ff9800;--pink:#ff6b9d;
  --text:#e8e8f4;--text2:#9090b0;--text3:#50507a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* APP SHELL */
.shell{display:grid;grid-template-columns:190px 1fr;grid-template-rows:50px 1fr;height:100vh}

/* TOPBAR */
.topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:12px;z-index:200}
.logo{font-family:'Oxanium',sans-serif;font-size:17px;font-weight:800;
  background:linear-gradient(135deg,var(--gold),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;flex-shrink:0}
.tbadge{background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  padding:3px 9px;font-size:10px;color:var(--text2);font-family:'Share Tech Mono',monospace}
.tbadge b{color:var(--gold)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.clock{font-family:'Share Tech Mono',monospace;font-size:19px;color:var(--cyan);
  letter-spacing:2px;text-shadow:0 0 18px rgba(0,229,255,.4)}
.clockdate{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3);margin-top:1px}
.daybadge{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;font-family:'Oxanium',sans-serif}
.wday{background:rgba(0,229,255,.12);color:var(--cyan);border:1px solid rgba(0,229,255,.25)}
.wend{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid rgba(245,200,66,.25)}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:8px 0;overflow-y:auto}
.nav-sec{padding:8px 12px 3px;font-size:9px;color:var(--text3);letter-spacing:2px;font-family:'Share Tech Mono',monospace}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;
  transition:all .12s;border-left:2px solid transparent;font-size:12px;color:var(--text2);font-weight:500}
.nav-item:hover{background:rgba(255,255,255,.03);color:var(--text)}
.nav-item.active{background:rgba(0,229,255,.06);color:var(--cyan);border-left-color:var(--cyan)}
.nav-icon{width:16px;text-align:center;font-size:13px}
.sidebar-stat{padding:6px 12px;font-size:11px;color:var(--text3)}
.sidebar-stat .sv{font-family:'Oxanium',sans-serif;font-weight:700;font-size:18px;color:var(--gold);line-height:1}

/* MAIN */
.main{overflow-y:auto;padding:14px;background:var(--bg)}
.ptitle{font-family:'Oxanium',sans-serif;font-size:20px;font-weight:800;margin-bottom:3px}
.psub{font-size:11px;color:var(--text3);margin-bottom:14px;font-family:'Share Tech Mono',monospace;letter-spacing:.5px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:13px;margin-bottom:10px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ctitle{font-family:'Oxanium',sans-serif;font-size:12px;font-weight:700;color:var(--text2);
  letter-spacing:1px;text-transform:uppercase}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}

/* STAT BOX */
.sbox{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:11px;text-align:center}
.sv{font-family:'Oxanium',sans-serif;font-size:24px;font-weight:800;line-height:1;margin-bottom:3px}
.sl{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase}

/* PROGRESS */
.pbar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:5px}
.pfill{height:100%;border-radius:3px;transition:width .5s}

/* BUTTONS */
.btn{padding:6px 12px;border:none;border-radius:5px;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;transition:all .12s;letter-spacing:.3px}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover{background:var(--gold2)}
.btn-cyan{background:rgba(0,229,255,.12);color:var(--cyan);border:1px solid rgba(0,229,255,.25)}
.btn-cyan:hover{background:rgba(0,229,255,.22)}
.btn-green{background:rgba(0,230,118,.12);color:var(--green);border:1px solid rgba(0,230,118,.25)}
.btn-green:hover{background:rgba(0,230,118,.22)}
.btn-red{background:rgba(255,68,68,.12);color:var(--red);border:1px solid rgba(255,68,68,.25)}
.btn-red:hover{background:rgba(255,68,68,.22)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{border-color:var(--text2);color:var(--text)}
.btn-purple{background:rgba(179,136,255,.12);color:var(--purple);border:1px solid rgba(179,136,255,.25)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px}

/* INPUTS */
input,textarea,select{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;
  color:var(--text);padding:6px 9px;font-family:'Rajdhani',sans-serif;font-size:12px;
  outline:none;transition:border-color .12s;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--cyan)}
input::placeholder{color:var(--text3)}
textarea{resize:vertical;min-height:60px}
label{font-size:10px;color:var(--text3);display:block;margin-bottom:3px;letter-spacing:.5px}
.fg{margin-bottom:8px}
.frow{display:flex;gap:8px}
.frow>.fg{flex:1}

/* TAGS */
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.5px}
.t-idt{background:rgba(0,229,255,.12);color:var(--cyan)}
.t-dt{background:rgba(245,200,66,.12);color:var(--gold)}
.t-done{background:rgba(0,230,118,.12);color:var(--green)}
.t-pend{background:rgba(255,68,68,.1);color:var(--red)}
.t-py{background:rgba(255,152,0,.12);color:var(--orange)}
.t-rev{background:rgba(179,136,255,.12);color:var(--purple)}
.t-long{background:rgba(0,230,118,.12);color:var(--green)}
.t-short{background:rgba(255,68,68,.12);color:var(--red)}

/* ALERTS */
.alert{border-radius:6px;padding:9px 12px;margin-bottom:10px;font-size:12px;display:flex;align-items:center;gap:9px}
.a-gold{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.25);color:var(--gold)}
.a-cyan{background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.18);color:var(--cyan)}
.a-green{background:rgba(0,230,118,.07);border:1px solid rgba(0,230,118,.18);color:var(--green)}
.a-red{background:rgba(255,68,68,.07);border:1px solid rgba(255,68,68,.18);color:var(--red)}
.a-purple{background:rgba(179,136,255,.07);border:1px solid rgba(179,136,255,.18);color:var(--purple)}

/* TIMELINE */
.tl-wrap{display:flex;flex-direction:column}
.tl-row{display:flex;align-items:stretch}
.tl-time{width:72px;flex-shrink:0;padding:7px 8px 7px 0;font-family:'Share Tech Mono',monospace;
  font-size:9px;color:var(--text3);text-align:right;padding-top:9px}
.tl-line{width:2px;background:var(--border);flex-shrink:0;position:relative}
.tl-dot{width:7px;height:7px;border-radius:50%;position:absolute;left:-3px;top:11px;background:var(--border2)}
.tl-dot.live{background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 1.2s infinite}
.tl-dot.done{background:var(--text3)}
.tl-dot.up{background:var(--cyan)}
.tl-dot.study{background:var(--gold)}
.tl-dot.trade{background:var(--green)}
.tl-dot.brk{background:var(--purple)}
.tl-body{flex:1;padding:5px 0 5px 14px;margin-bottom:3px}
.tl-block{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:7px 11px}
.tl-block.live-b{border-color:var(--green);background:rgba(0,230,118,.04);box-shadow:0 0 10px rgba(0,230,118,.08)}
.tl-block.study-b{border-color:rgba(245,200,66,.25);background:rgba(245,200,66,.03)}
.tl-block.trade-b{border-color:rgba(0,230,118,.2);background:rgba(0,230,118,.03)}
.tl-bname{font-weight:700;font-size:12px;margin-bottom:2px}
.tl-bsub{font-size:10px;color:var(--text3)}

/* TRADE ENTRY */
.trade-row{background:var(--card2);border:1px solid var(--border);border-radius:6px;
  padding:9px 11px;margin-bottom:6px;display:grid;
  grid-template-columns:70px 60px 1fr 1fr 1fr 1fr 80px 70px;gap:8px;align-items:center;font-size:11px}
.trade-row:hover{border-color:var(--border2)}
.tr-pnl-pos{color:var(--green);font-weight:700;font-family:'Share Tech Mono',monospace}
.tr-pnl-neg{color:var(--red);font-weight:700;font-family:'Share Tech Mono',monospace}

/* ERROR ENTRY */
.err-entry{background:var(--card2);border:1px solid var(--border);border-left:3px solid var(--red);
  border-radius:6px;padding:9px 11px;margin-bottom:7px}
.err-entry.concept{border-left-color:var(--cyan)}
.err-entry.time{border-left-color:var(--orange)}
.err-entry.emotional{border-left-color:var(--purple)}
.etbadge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;
  letter-spacing:1px;margin-bottom:5px;text-transform:uppercase}
.et-concept{background:rgba(0,229,255,.12);color:var(--cyan)}
.et-time{background:rgba(255,152,0,.12);color:var(--orange)}
.et-emotional{background:rgba(179,136,255,.12);color:var(--purple)}
.et-trade{background:rgba(255,68,68,.12);color:var(--red)}
.ef-label{font-size:9px;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:1px}
.ef-val{font-size:11px;color:var(--text);margin-bottom:5px}
.prev-rule{background:rgba(0,230,118,.06);border:1px solid rgba(0,230,118,.18);
  border-radius:4px;padding:5px 9px;font-size:11px;color:var(--green);margin-top:5px}

/* POMODORO */
.pom-display{font-family:'Oxanium',sans-serif;font-size:48px;font-weight:800;text-align:center;
  letter-spacing:3px;padding:12px 0 6px}

/* IMPROVEMENT */
.imp-entry{display:flex;gap:9px;padding:8px 10px;background:var(--card2);
  border:1px solid var(--border);border-radius:5px;margin-bottom:5px;align-items:flex-start}
.imp-score{font-family:'Oxanium',sans-serif;font-size:22px;font-weight:800;min-width:36px;
  text-align:center;line-height:1;padding-top:2px}

/* TARGET */
.tgt-item{display:flex;align-items:center;gap:9px;padding:7px 9px;background:var(--card2);
  border:1px solid var(--border);border-radius:5px;margin-bottom:5px;cursor:pointer;transition:background .12s}
.tgt-item:hover{background:rgba(255,255,255,.03)}
.tgt-item.done{opacity:.55}
.tgt-item.done .tgt-txt{text-decoration:line-through;color:var(--text3)}
.tgt-chk{width:17px;height:17px;border-radius:50%;border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;transition:all .12s}
.tgt-chk.chkd{background:var(--green);border-color:var(--green);color:#000}
.tgt-txt{font-size:12px;font-weight:500}
.tgt-sub{font-size:10px;color:var(--text3);margin-top:1px}

/* REV TABLE */
.rtable{width:100%;border-collapse:collapse;font-size:11px}
.rtable th{text-align:left;padding:5px 7px;color:var(--text3);font-size:9px;letter-spacing:1px;
  border-bottom:1px solid var(--border);font-family:'Share Tech Mono',monospace}
.rtable td{padding:5px 7px;border-bottom:1px solid rgba(26,26,50,.5);vertical-align:middle}
.rtable tr:hover td{background:rgba(255,255,255,.015)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;
  display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:10px;
  padding:18px;width:520px;max-width:96vw;max-height:85vh;overflow-y:auto}
.mtitle{font-family:'Oxanium',sans-serif;font-size:15px;font-weight:700;margin-bottom:13px;color:var(--gold)}

/* PYTHON */
.py-topic{background:var(--card2);border:1px solid var(--border);border-radius:6px;
  padding:9px 11px;margin-bottom:7px;display:flex;align-items:center;gap:11px}
.py-icon{font-size:18px;min-width:26px;text-align:center}
.py-info{flex:1}
.py-title{font-weight:700;font-size:12px;margin-bottom:2px}
.py-src{font-size:9px;color:var(--text3)}

/* QUOTE */
.quote{background:linear-gradient(135deg,rgba(245,200,66,.04),rgba(0,229,255,.04));
  border:1px solid var(--border2);border-radius:7px;padding:12px 14px;
  font-style:italic;color:var(--text2);font-size:13px;line-height:1.6;margin-bottom:10px;position:relative}
.quote::before{content:'"';font-size:44px;color:var(--gold);opacity:.25;
  position:absolute;top:-6px;left:8px;font-family:Georgia,serif;line-height:1}

/* TODAY STRIP */
.today-strip{background:linear-gradient(90deg,rgba(0,229,255,.07),transparent);
  border:1px solid rgba(0,229,255,.18);border-radius:6px;padding:9px 13px;
  margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}

/* CAPITAL METER */
.cap-meter{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:11px}
.cap-bar-wrap{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:6px;position:relative}
.cap-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.cap-limit-line{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:.7}

/* BIAS BOX */
.bias-btn{padding:8px 16px;border-radius:5px;cursor:pointer;font-family:'Oxanium',sans-serif;
  font-weight:700;font-size:13px;border:2px solid transparent;transition:all .15s;flex:1;text-align:center}
.bias-bull{border-color:var(--green);color:var(--green)}
.bias-bull.sel{background:rgba(0,230,118,.2);box-shadow:0 0 10px rgba(0,230,118,.2)}
.bias-bear{border-color:var(--red);color:var(--red)}
.bias-bear.sel{background:rgba(255,68,68,.2);box-shadow:0 0 10px rgba(255,68,68,.2)}
.bias-side{border-color:var(--orange);color:var(--orange)}
.bias-side.sel{background:rgba(255,152,0,.2);box-shadow:0 0 10px rgba(255,152,0,.2)}

/* MINDSET METER */
.mind-btn{padding:6px;border-radius:4px;cursor:pointer;font-family:'Oxanium',sans-serif;
  font-weight:700;font-size:14px;border:1px solid var(--border2);transition:all .12s;
  text-align:center;background:var(--card2)}
.mind-btn.sel{border-color:var(--gold);background:rgba(245,200,66,.15);color:var(--gold)}
.mind-btn:hover{border-color:var(--border)}

/* EMOTION BTN */
.emo-btn{padding:5px 9px;border-radius:4px;cursor:pointer;font-size:11px;
  border:1px solid var(--border2);background:var(--card2);color:var(--text2);transition:all .12s}
.emo-btn.sel{border-color:var(--cyan);background:rgba(0,229,255,.1);color:var(--cyan)}

/* COACH MSG */
.coach-msg{background:linear-gradient(135deg,rgba(179,136,255,.06),rgba(0,229,255,.04));
  border:1px solid rgba(179,136,255,.2);border-radius:7px;padding:12px 14px}
.coach-avatar{font-size:28px;margin-bottom:6px}
.coach-text{font-size:13px;color:var(--text);line-height:1.7}

/* DISCIPLINE */
.rule-item{display:flex;align-items:center;gap:9px;padding:7px 9px;background:var(--card2);
  border:1px solid var(--border);border-radius:5px;margin-bottom:5px;cursor:pointer}
.rule-item.ok{border-color:rgba(0,230,118,.25);background:rgba(0,230,118,.04)}
.rule-item.broken{border-color:rgba(255,68,68,.25);background:rgba(255,68,68,.04)}
.rule-chk{width:16px;height:16px;border-radius:3px;border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.rule-chk.ok{background:var(--green);border-color:var(--green);color:#000}
.rule-chk.broken{background:var(--red);border-color:var(--red);color:#fff}

/* EVENING */
.eve-field{margin-bottom:8px}

/* WEEKLY REVIEW */
.wr-section{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:11px;margin-bottom:8px}
.wr-stitle{font-family:'Oxanium',sans-serif;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px}

/* FOCUS MODE */
.focus-overlay{position:fixed;inset:0;background:var(--bg);z-index:1000;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.focus-topic{font-family:'Oxanium',sans-serif;font-size:32px;font-weight:800;color:var(--gold);text-align:center}
.focus-sub{font-size:14px;color:var(--text3);text-align:center}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;
  margin-left:6px;animation:pulse 1.2s infinite;vertical-align:middle}

hr{border:none;border-top:1px solid var(--border);margin:10px 0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ═══════════════════════════════════════════════
// CONSTANTS & DATA
// ═══════════════════════════════════════════════
const STARTING_CAPITAL = 15000
const DAILY_LOSS_LIMIT_PCT = 2   // 2% of capital
const DAILY_LOSS_LIMIT = STARTING_CAPITAL * DAILY_LOSS_LIMIT_PCT / 100

const IDT_TOPICS = [
  {date:"2026-03-05",topic:"Supply + Charge"},
  {date:"2026-03-06",topic:"Composition Levy + Registration"},
  {date:"2026-03-07",topic:"Tax Invoice + Time of Supply"},

  {date:"2026-03-11",topic:"ITC"},
  {date:"2026-03-12",topic:"ITC + Jobwork"},
  {date:"2026-03-13",topic:"Returns + Eway Bill"},
  {date:"2026-03-14",topic:"Assessment + Inspection + Advance Ruling"},
  {date:"2026-03-15",topic:"Demand + Appeal"},
  {date:"2026-03-16",topic:"Refund + Misc"},
  {date:"2026-03-17",topic:"Offences + Ethics + Liab to pay"},
  {date:"2026-03-18",topic:"Valuation"},
  {date:"2026-03-19",topic:"Import procedure"},
  {date:"2026-03-20",topic:"Baggage + Types of Duty"},

  {date:"2026-03-24",topic:"RTP + Revision + Test (IDT)",special:"RTP"},
]
const DT_TOPICS = [
  {date:"2026-03-25",topic:"Basic Concepts + PGBP",sub:"Income Tax"},
  {date:"2026-03-26",topic:"PGBP",sub:"Income Tax"},
  {date:"2026-03-27",topic:"PGBP",sub:"Income Tax"},
  {date:"2026-03-28",topic:"MAT/AMT",sub:"Income Tax"},
  {date:"2026-03-29",topic:"Capital Gains",sub:"Income Tax"},
  {date:"2026-03-30",topic:"IFOS + Deductions",sub:"Income Tax"},
  {date:"2026-03-31",topic:"Taxation of various entities",sub:"Income Tax"},
  {date:"2026-04-01",topic:"Charitable trust + Agriculture",sub:"Income Tax"},
  {date:"2026-04-02",topic:"TDS + TCS",sub:"Income Tax"},
  {date:"2026-04-03",topic:"Assessment, IT authority",sub:"Income Tax"},
  {date:"2026-04-04",topic:"Appeal + Small Topics",sub:"Income Tax"},
  {date:"2026-04-05",topic:"Other pending Topics",sub:"Income Tax"},

// Helpers
function fmt(d){return new Date(d).toISOString().split('T')[0]}
function todayStr(){return fmt(new Date())}
function getDOW(ds){return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(ds).getDay()]}
function isWE(ds){const d=new Date(ds).getDay();return d===0||d===6}
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function fmtINR(n){return(n>=0?'+':'')+n.toFixed(0)}
function fmtTime(d){return d.toTimeString().slice(0,8)}

function buildRevPlan(){
  const all=[...IDT_TOPICS.map(t=>({...t,subject:'IDT'})),...DT_TOPICS.map(t=>({...t,subject:'DT'}))]
  const start=new Date('2026-03-08'),end=new Date('2026-05-01')
  const wdays=[]
  const d=new Date(start)
  while(d<=end){if(d.getDay()>=1&&d.getDay()<=5)wdays.push(fmt(d));d.setDate(d.getDate()+1)}
  const slots=[]
  for(let r=1;r<=5;r++) all.forEach(t=>slots.push({...t,revision:r}))
  const plan={}
  let si=0
  wdays.forEach(date=>{
    const n=Math.min(2,slots.length-si)
    plan[date]=[]
    for(let i=0;i<n;i++){plan[date].push(slots[si]);si++}
  })
  return plan
}

function buildWeekendPlan(){
  const d=new Date('2026-03-08'),end=new Date('2026-05-01')
  const plan={}
  let pi=0
  const dd=new Date(d)
  while(dd<=end){
    const dow=dd.getDay()
    if(dow===6||dow===0){
      const ds=fmt(dd)
      const subjects=['IDT - GST','IDT - Customs','DT - Income Tax','DT - Int Taxation','Full DT+IDT Mixed']
      plan[ds]={test:dow===6,python:WEEKEND_PYTHON[pi%WEEKEND_PYTHON.length],testSubject:subjects[Math.floor(pi/2)%subjects.length]}
      pi++
    }
    dd.setDate(dd.getDate()+1)
  }
  return plan
}

  function PostMarket(){
    const [form,setForm]=React.useState(postMarket)
    // Trade stats
    const best=todayTrades.length>0?todayTrades.reduce((a,b)=>Number(a.pnl)>Number(b.pnl)?a:b):null
    const worst=todayTrades.length>0?todayTrades.reduce((a,b)=>Number(a.pnl)<Number(b.pnl)?a:b):null

    // Weekly stats
    const weekStart=fmt(new Date(Date.now()-7*86400000))
    const weekTrades=trades.filter(t=>t.date>=weekStart)
    const dayStats=['Mon','Tue','Wed','Thu','Fri'].map(day=>{
      const dt=weekTrades.filter(t=>getDOW(t.date)===day)
      return{day,count:dt.length,pnl:dt.reduce((a,b)=>a+Number(b.pnl),0)}
    })
    const setupStats=[...new Set(trades.map(t=>t.setup))].map(s=>{
      const st=trades.filter(t=>t.setup===s)
      const wins=st.filter(t=>Number(t.pnl)>0).length
      return{setup:s,count:st.length,wr:st.length>0?Math.round(wins/st.length*100):0,pnl:st.reduce((a,b)=>a+Number(b.pnl),0)}
    })

    return(
      <div>
        <div className="ptitle">Post-Market Debrief</div>
        <div className="psub">DAILY REVIEW · AFTER 12:00 PM · LEARN FROM EVERY SESSION</div>

        <div className="g2">

                placeholder={best?`Auto: ${best.setup} ${fmtINR(Number(best.pnl))}₹`:"Describe the best trade"}/>
            </div>
            <div className="fg"><label>WORST TRADE — WHAT WENT WRONG?</label>
              <input value={form.worstTrade} onChange={e=>setForm(f=>({...f,worstTrade:e.target.value}))}

              <textarea value={form.tomorrowPlan} onChange={e=>setForm(f=>({...f,tomorrowPlan:e.target.value}))} placeholder="What will I do differently tomorrow?"/></div>
            <button className="btn btn-gold" style={{width:'100%'}} onClick={()=>setPostMarket({...form,saved:true})}>✓ Save Debrief</button>
          </div>

          <div>
            {/* Today summary */}
            <div className="card">
              <div className="card-hdr"><div className="ctitle">📊 Today Stats</div></div>
              <div className="g2">
                <div className="sbox"><div className="sv" style={{color:todayPnL>=0?'var(--green)':'var(--red)'}}>{fmtINR(todayPnL)}₹</div><div className="sl">P&L</div></div>

              </div>
              {best&&<div style={{marginTop:8,padding:'6px 9px',background:'rgba(0,230,118,.06)',border:'1px solid rgba(0,230,118,.15)',borderRadius:5,fontSize:11}}>

              </div>}
              {worst&&worst!==best&&<div style={{marginTop:6,padding:'6px 9px',background:'rgba(255,68,68,.06)',border:'1px solid rgba(255,68,68,.15)',borderRadius:5,fontSize:11}}>
                Worst: <span style={{color:'var(--red)',fontWeight:700}}>{fmtINR(Number(worst.pnl))}₹</span> · {worst.setup}
              </div>}
            </div>

            {/* Day of week stats */}

              {dayStats.map(d=>(

                  <span style={{width:36,fontWeight:700,color:'var(--text2)'}}>{d.day}</span>

                </div>

            {/* Setup win rates */}
            {setupStats.length>0&&<div className="card">
              <div className="card-hdr"><div className="ctitle">🔧 Setup Win Rates</div></div>

  function WeeklyReview(){
    const weekStart=fmt(new Date(Date.now()-7*86400000))
    const weekErrors=errors.filter(e=>e.date>=weekStart)
    const weekTrades=trades.filter(t=>t.date>=weekStart)
    const weekImprove=improvements.filter(i=>i.date>=weekStart)
    const weekPnL=weekTrades.reduce((a,b)=>a+Number(b.pnl),0)
    const weekRevDone=Object.keys(progress).length

    // Pattern detection
    const biasPattern=biasLog.filter(b=>b.date>=weekStart).reduce((acc,b)=>{acc[b.bias]=(acc[b.bias]||0)+1;return acc},{})
    const topBias=Object.entries(biasPattern).sort((a,b)=>b[1]-a[1])[0]
    const errorPattern=weekErrors.reduce((acc,e)=>{acc[e.type]=(acc[e.type]||0)+1;return acc},{})

    const avgScore=weekImprove.length>0?(weekImprove.reduce((a,b)=>a+Number(b.score),0)/weekImprove.length).toFixed(1):null

    return(
      <div>
        <div className="ptitle">Weekly Review</div>
        <div className="psub">EVERY SUNDAY · AUTO-PULLED DATA · IDENTIFY PATTERNS</div>

        <div className="g4" style={{marginBottom:10}}>
          <div className="sbox"><div className="sv" style={{color:weekPnL>=0?'var(--green)':'var(--red)'}}>{fmtINR(weekPnL)}₹</div><div className="sl">Week P&L</div></div>
          <div className="sbox"><div className="sv" style={{color:'var(--cyan)'}}>{weekTrades.length}</div><div className="sl">Week Trades</div></div>
          <div className="sbox"><div className="sv" style={{color:'var(--gold)'}}>{weekErrors.length}</div><div className="sl">Errors Logged</div></div>
          <div className="sbox"><div className="sv" style={{color:'var(--purple)'}}>{avgScore||'—'}</div><div className="sl">Avg Score</div></div>
        </div>

        <div className="g2">
          <div>
            <div className="wr-section">
              <div className="wr-stitle">📊 Trading Patterns This Week</div>
              {topBias&&<div className="alert a-purple" style={{marginBottom:8}}>
                Top bias: <strong>"{topBias[0]}"</strong> appeared {topBias[1]}× — identify your trigger for this
              </div>}
              {weekTrades.length===0?<div style={{color:'var(--text3)',fontSize:11}}>No trades this week</div>:
                weekTrades.map((t,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:11,padding:'4px 0',borderBottom:'1px solid var(--border)'}}>
                    <span>{t.date} · {t.setup}</span>
                    <span style={{color:Number(t.pnl)>=0?'var(--green)':'var(--red)',fontFamily:'Share Tech Mono'}}>{fmtINR(Number(t.pnl))}₹</span>
                  </div>
                ))
              }
            </div>

            <div className="wr-section">
              <div className="wr-stitle">⚠ Error Patterns This Week</div>
              {Object.entries(errorPattern).map(([type,count])=>(
                <div key={type} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'4px 0'}}>
                  <span style={{color:'var(--text2)',textTransform:'capitalize'}}>{type} errors</span>
                  <span style={{color:'var(--red)',fontWeight:700}}>{count}×</span>
                </div>
              ))}
              {weekErrors.length===0&&<div style={{color:'var(--text3)',fontSize:11}}>No errors logged this week</div>}
            </div>
          </div>

          <div>
            <div className="wr-section">
              <div className="wr-stitle">📖 CA Revision Coverage</div>
              {[{label:'IDT',topics:IDT_TOPICS},{label:'DT',topics:DT_TOPICS}].map(({label,topics})=>{
                const done=topics.reduce((a,t)=>[1,2,3,4,5].filter(r=>progress[`${t.date}_${t.topic.slice(0,8)}_r${r}`]).length+a,0)

                return(

                    <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>

                  </div>

              <div className="wr-stitle">📝 Next Week's 3 Rules</div>
              <div style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>Based on this week's patterns, set 3 strict rules for next week:</div>

    {id:'schedule',icon:'⏰',label:'Schedule'},
    {id:'premarket',icon:'📊',label:'Pre-Market'},
    {id:'trades',icon:'💹',label:'Trade Journal'},
    {id:'postmarket',icon:'📋',label:'Post-Market'},
    {id:'mindset',icon:'🧠',label:'Mindset'},
    {id:'catrade',icon:'🔗',label:'CA ↔ Trading'},
    {id:'revision',icon:'📅',label:'Revision Plan'},
    {id:'errors',icon:'⚠',label:'Error System'},
    {id:'improvement',icon:'📈',label:'Improvement'},
    {id:'weekend',icon:'🐍',label:'Weekend Plan'},
    {id:'weekly',icon:'🔁',label:'Weekly Review'},
  ]

  function renderContent(){
    switch(tab){
      case 'dashboard': return <Dashboard/>
      case 'schedule': return <Schedule/>
      case 'premarket': return <PreMarket/>
      case 'trades': return <TradeJournal/>
      case 'postmarket': return <PostMarket/>
      case 'mindset': return <MindsetPage/>
      case 'catrade': return <CATradeLink/>
      case 'revision': return <RevisionPage/>
      case 'errors': return <ErrorSystem/>
      case 'improvement': return <ImprovementPage/>
      case 'weekend': return <WeekendPage/>
      case 'weekly': return <WeeklyReview/>
      default: return <Dashboard/>
    }
  }

  return(
    <div className="shell">
      {/* TOPBAR */}
      <div className="topbar">
        <div className="logo">⚡ NIDHI CA v3</div>
        <div className="tbadge">CA Final · Group 2 · <b>5× Revision</b></div>
        <div className="tbadge">Nifty 50 · Capital: <b>₹{currentCapital.toFixed(0)}</b></div>
        <div className="tbadge">P&L Today: <b style={{color:todayPnL>=0?'var(--green)':'var(--red)'}}>{fmtINR(todayPnL)}₹</b></div>
        {dailyLossReached&&<div className="tbadge" style={{background:'rgba(255,68,68,.15)',borderColor:'rgba(255,68,68,.4)',color:'var(--red)'}}>🚨 LOSS LIMIT HIT</div>}
        <div className="topbar-right">
          <div><div className="clock">{fmtTime(clock)}</div>
            <div className="clockdate">{clock.toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'})}</div>
          </div>
          <div className={`daybadge ${isWEtoday?'wend':'wday'}`}>{isWEtoday?'📚 WEEKEND':'📊 WEEKDAY'}</div>
        </div>
      </div>

      {/* SIDEBAR */}
      <div className="sidebar">
        <div className="nav-sec">MAIN</div>
        {NAV.slice(0,2).map(n=>(
          <div key={n.id} className={`nav-item ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
            <span className="nav-icon">{n.icon}</span>{n.label}
          </div>
        ))}
        <div className="nav-sec">TRADING</div>
        {NAV.slice(2,7).map(n=>(
          <div key={n.id} className={`nav-item ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
            <span className="nav-icon">{n.icon}</span>{n.label}
          </div>
        ))}
        <div className="nav-sec">CA STUDY</div>
        {NAV.slice(7,10).map(n=>(
          <div key={n.id} className={`nav-item ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
            <span className="nav-icon">{n.icon}</span>{n.label}
          </div>
        ))}
        <div className="nav-sec">WEEKEND & REVIEW</div>
        {NAV.slice(10).map(n=>(
          <div key={n.id} className={`nav-item ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
            <span className="nav-icon">{n.icon}</span>{n.label}
          </div>
        ))}
        <hr/>
        <div className="sidebar-stat">
          <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>TODAY TARGETS</div>
          <div className="sv">{doneTargets}/{dailyTargets.length}</div>
          <div className="pbar"><div className="pfill" style={{width:(doneTargets/dailyTargets.length*100)+'%',background:'var(--gold)'}}></div></div>
        </div>
        <div className="sidebar-stat">
          <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>REVISION</div>
          <div className="sv" style={{color:'var(--cyan)'}}>{revPct}%</div>
          <div className="pbar"><div className="pfill" style={{width:revPct+'%',background:'var(--cyan)'}}></div></div>
        </div>
        <hr/>
        <div style={{padding:'4px 10px',display:'flex',flexDirection:'column',gap:3}}>
          <button className="btn btn-ghost btn-sm" style={{textAlign:'left',fontSize:10}} onClick={()=>setShowTradeModal(true)}>💹 Log Trade</button>
          <button className="btn btn-ghost btn-sm" style={{textAlign:'left',fontSize:10}} onClick={()=>setShowErrModal(true)}>⚠ Log Error</button>
          <button className="btn btn-ghost btn-sm" style={{textAlign:'left',fontSize:10}} onClick={()=>setFocusMode(true)}>🎯 Focus Mode</button>
        </div>
      </div>

      {/* MAIN */}
      <div className="main">{renderContent()}</div>

      {/* FOCUS MODE */}
      {focusMode&&(
        <div className="focus-overlay">
          <div style={{fontSize:40,marginBottom:8}}>🎯</div>
          <div className="focus-topic">
            {getTodayTopics()[0]?.topic||'Study Session'}
          </div>
          <div className="focus-sub">{getTodayTopics()[0]?.subject||''} · Revision {getTodayTopics()[0]?.revision||1} of 5</div>
          <div style={{fontFamily:'Oxanium',fontSize:52,fontWeight:800,color:'var(--gold)',margin:'20px 0',
            textShadow:'0 0 30px rgba(245,200,66,.4)'}}>
            {String(Math.floor(pomTimer/60)).padStart(2,'0')}:{String(pomTimer%60).padStart(2,'0')}
          </div>
          <div style={{display:'flex',gap:10,marginBottom:24}}>
            <button className="btn btn-green" onClick={()=>setPomRun(true)}>▶ Start</button>
            <button className="btn btn-ghost" onClick={()=>setPomRun(false)}>⏸ Pause</button>
            <button className="btn btn-ghost" onClick={()=>{setPomRun(false);setPomTimer(25*60)}}>↺ Reset</button>
          </div>
          <button className="btn btn-ghost" onClick={()=>setFocusMode(false)}>✕ Exit Focus Mode</button>
        </div>
      )}

      {/* TRADE MODAL */}
      {showTradeModal&&(
        <div className="overlay" onClick={e=>{if(e.target.className==='overlay')setShowTradeModal(false)}}>
          <div className="modal">
            <div className="mtitle">💹 Log Trade — Nifty 50</div>
            <form onSubmit={addTrade}>
              <div className="frow">
                <div className="fg"><label>TIME</label><input type="time" value={tradeForm.time} onChange={e=>setTradeForm(f=>({...f,time:e.target.value}))}/></div>
                <div className="fg"><label>DIRECTION</label>
                  <div style={{display:'flex',gap:6,marginTop:3}}>
                    {['LONG','SHORT'].map(d=>(
                      <button type="button" key={d} className={`btn btn-sm ${tradeForm.direction===d?(d==='LONG'?'btn-green':'btn-red'):'btn-ghost'}`}
                        onClick={()=>setTradeForm(f=>({...f,direction:d}))}>{d}</button>
                    ))}
                  </div>
                </div>
              </div>
              <div className="frow">
                <div className="fg"><label>ENTRY PRICE</label><input type="number" value={tradeForm.entry} onChange={e=>setTradeForm(f=>({...f,entry:e.target.value}))} placeholder="22450" required/></div>
                <div className="fg"><label>EXIT PRICE</label><input type="number" value={tradeForm.exit} onChange={e=>setTradeForm(f=>({...f,exit:e.target.value}))} placeholder="22500" required/></div>
                <div className="fg"><label>QTY (lots)</label><input type="number" value={tradeForm.qty} onChange={e=>setTradeForm(f=>({...f,qty:e.target.value}))} placeholder="1" required/></div>
              </div>
              <div className="fg"><label>SETUP TYPE</label>
                <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:3}}>
                  {TRADE_SETUPS.map(s=>(
                    <div key={s} className={`emo-btn ${tradeForm.setup===s?'sel':''}`} onClick={()=>setTradeForm(f=>({...f,setup:s}))}>{s}</div>
                  ))}
                </div>
              </div>
              <div className="fg"><label>EMOTION AT ENTRY</label>
                <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:3}}>
                  {COGNITIVE_BIASES.map(b=>(
                    <div key={b} className={`emo-btn ${tradeForm.emotion===b?'sel':''}`} onClick={()=>setTradeForm(f=>({...f,emotion:b}))}>{b}</div>
                  ))}
                </div>
              </div>
              <div className="fg"><label>CA EDGE (if any CA knowledge helped this trade)</label>
                <input value={tradeForm.caEdge} onChange={e=>setTradeForm(f=>({...f,caEdge:e.target.value}))} placeholder="e.g. GST rate change news affected sector"/></div>
              <div className="fg"><label>NOTES</label><input value={tradeForm.notes} onChange={e=>setTradeForm(f=>({...f,notes:e.target.value}))} placeholder="Additional notes"/></div>
              {tradeForm.entry&&tradeForm.exit&&(
                <div style={{background:calcTradeForm()>=0?'rgba(0,230,118,.08)':'rgba(255,68,68,.08)',
                  border:`1px solid ${calcTradeForm()>=0?'rgba(0,230,118,.25)':'rgba(255,68,68,.25)'}`,
                  borderRadius:5,padding:'8px 11px',marginBottom:10,fontFamily:'Oxanium',fontWeight:700,fontSize:18,
                  color:calcTradeForm()>=0?'var(--green)':'var(--red)',textAlign:'center'}}>
                  Estimated P&L: {fmtINR(calcTradeForm())} ₹
                </div>
              )}
              <div style={{display:'flex',gap:7,justifyContent:'flex-end',marginTop:10}}>
                <button type="button" className="btn btn-ghost" onClick={()=>setShowTradeModal(false)}>Cancel</button>
                <button type="submit" className="btn btn-gold">Save Trade</button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* ERROR MODAL */}
      {showErrModal&&(
        <div className="overlay" onClick={e=>{if(e.target.className==='overlay')setShowErrModal(false)}}>
          <div className="modal">
            <div className="mtitle">⚠ Error Recovery Entry</div>
            <form onSubmit={addError}>
              <div className="frow">
                <div className="fg"><label>TYPE</label>
                  <select value={errForm.type} onChange={e=>setErrForm(f=>({...f,type:e.target.value}))}>
                    <option value="concept">Concept Error</option>
                    <option value="time">Time Management</option>
                    <option value="emotional">Emotional</option>
                    <option value="trade">Trade Error</option>
                  </select>
                </div>
                <div className="fg"><label>SUBJECT</label>
                  <select value={errForm.subject} onChange={e=>setErrForm(f=>({...f,subject:e.target.value}))}>
                    <option value="IDT">IDT</option>
                    <option value="DT">DT Income Tax</option>
                    <option value="DT-Int">DT Int Taxation</option>
                    <option value="Trading">Trading</option>
                  </select>
                </div>
              </div>
              <div className="fg"><label>TOPIC</label><input value={errForm.topic} onChange={e=>setErrForm(f=>({...f,topic:e.target.value}))} placeholder="e.g. ITC, Capital Gains, Setup" required/></div>
              <div className="fg"><label>WHAT WENT WRONG?</label><textarea value={errForm.problem} onChange={e=>setErrForm(f=>({...f,problem:e.target.value}))} required/></div>
              <div className="fg"><label>ROOT CAUSE</label><input value={errForm.rootCause} onChange={e=>setErrForm(f=>({...f,rootCause:e.target.value}))} required/></div>
              <div className="fg"><label>CORRECT APPROACH</label><input value={errForm.correct} onChange={e=>setErrForm(f=>({...f,correct:e.target.value}))} required/></div>
              <div className="fg"><label>🛡 PREVENTION RULE — "If this happens again, I will..."</label>
                <input value={errForm.prevention} onChange={e=>setErrForm(f=>({...f,prevention:e.target.value}))} required/></div>
              <div style={{display:'flex',gap:7,justifyContent:'flex-end',marginTop:10}}>
                <button type="button" className="btn btn-ghost" onClick={()=>setShowErrModal(false)}>Cancel</button>
                <button type="submit" className="btn btn-gold">Save Entry</button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* IMPROVEMENT MODAL */}
      {showImpModal&&(
        <div className="overlay" onClick={e=>{if(e.target.className==='overlay')setShowImpModal(false)}}>
          <div className="modal">
            <div className="mtitle">📈 Daily Improvement Log</div>
            <form onSubmit={addImprovement}>
              <div className="fg"><label>PERFORMANCE SCORE (1–10)</label>
                <input type="range" min="1" max="10" value={impForm.score} onChange={e=>setImpForm(f=>({...f,score:Number(e.target.value)}))} style={{marginTop:4}}/>
                <div style={{textAlign:'center',fontFamily:'Oxanium',fontWeight:700,fontSize:26,
                  color:impForm.score>=8?'var(--green)':impForm.score>=6?'var(--gold)':'var(--red)',marginTop:3}}>{impForm.score}/10</div>
              </div>
              <div className="fg"><label>✓ TODAY'S WIN</label><input value={impForm.highlight} onChange={e=>setImpForm(f=>({...f,highlight:e.target.value}))} placeholder="Best thing that happened"/></div>
              <div className="fg"><label>✗ STRUGGLED WITH</label><input value={impForm.struggled} onChange={e=>setImpForm(f=>({...f,struggled:e.target.value}))} placeholder="What was hard?"/></div>
              <div className="fg"><label>→ TOMORROW'S FOCUS</label><input value={impForm.tomorrow} onChange={e=>setImpForm(f=>({...f,tomorrow:e.target.value}))} placeholder="What will I do better?"/></div>
              <div style={{display:'flex',gap:7,justifyContent:'flex-end',marginTop:10}}>
                <button type="button" className="btn btn-ghost" onClick={()=>setShowImpModal(false)}>Cancel</button>
                <button type="submit" className="btn btn-gold">Save Log</button>
              </div>
            </form>
          </div>
        </div>
      )}

      {/* EVENING MODAL */}
      {showEveModal&&(
        <div className="overlay" onClick={e=>{if(e.target.className==='overlay')setShowEveModal(false)}}>
          <div className="modal">
            <div className="mtitle">🌙 Evening Reset Ritual</div>
            <div style={{fontSize:11,color:'var(--text3)',marginBottom:12}}>5 minutes before Study Slot 3 · Close the day mentally</div>
            <div className="fg"><label>🙏 GRATEFUL FOR TODAY</label>
              <input value={eveningLog.grateful||''} onChange={e=>setEveningLog(l=>({...l,grateful:e.target.value}))} placeholder="One thing"/></div>
            <div className="fg"><label>📖 KEY LEARNING</label>
              <input value={eveningLog.learned||''} onChange={e=>setEveningLog(l=>({...l,learned:e.target.value}))} placeholder="What did you learn today?"/></div>
            <div className="fg"><label>🕊 LET GO OF</label>
              <input value={eveningLog.letgo||''} onChange={e=>setEveningLog(l=>({...l,letgo:e.target.value}))} placeholder="Release before night study"/></div>
            <div className="fg"><label>MOOD (1–10)</label>
              <input type="range" min="1" max="10" value={eveningLog.mood||7} onChange={e=>setEveningLog(l=>({...l,mood:Number(e.target.value)}))} style={{marginTop:4}}/>
              <div style={{textAlign:'center',fontFamily:'Oxanium',fontWeight:700,fontSize:20,color:eveningLog.mood>=7?'var(--green)':'var(--gold)'}}>{eveningLog.mood}/10</div>
            </div>
            <div className="fg"><label>SLEEP TARGET</label>
              <input type="time" value={eveningLog.sleepTarget||'23:00'} onChange={e=>setEveningLog(l=>({...l,sleepTarget:e.target.value}))}/></div>
            <div style={{display:'flex',gap:7,justifyContent:'flex-end',marginTop:10}}>
              <button type="button" className="btn btn-ghost" onClick={()=>setShowEveModal(false)}>Cancel</button>
              <button type="button" className="btn btn-gold" onClick={()=>{setEveningLog(l=>({...l,saved:true}));setShowEveModal(false)}}>Save & Reset</button>
            </div>
          </div>
        </div>
      )}
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
